<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoctorPro — Nueva contraseña</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; }
  .card { background: white; padding: 36px 32px; border-radius: 8px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.12); width: 100%; max-width: 380px; }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-name { font-size: 26px; font-weight: bold; }
  .logo-name span { color: #cc0000; }
  .logo-sub { font-size: 11px; color: #888; letter-spacing: 2px; margin-top: 2px; }
  h2 { font-size: 16px; color: #333; margin-bottom: 20px; text-align: center; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 4px; }
  .field input { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px;
                 font-size: 14px; outline: none; }
  .field input:focus { border-color: #cc0000; }
  .btn-submit { width: 100%; padding: 11px; background: #cc0000; color: white;
                border: none; border-radius: 4px; font-size: 15px; font-weight: bold;
                cursor: pointer; margin-top: 6px; }
  .btn-submit:hover { background: #aa0000; }
  .msg { border-radius: 4px; padding: 10px 12px; font-size: 13px; margin-bottom: 14px; display: none; }
  .msg.error   { background: #ffeeee; color: #cc0000; border: 1px solid #ffcccc; }
  .msg.success { background: #eeffee; color: #2a7a2a; border: 1px solid #aaddaa; }
  .toggle { text-align: center; margin-top: 16px; font-size: 13px; }
  .toggle a { color: #cc0000; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-name">Doctor<span>Pro</span></div>
    <div class="logo-sub">FORMULARIOS MÉDICOS DIGITALES</div>
  </div>

  <div id="msg" class="msg"></div>

  <div id="form-reset">
    <h2>Nueva contraseña</h2>
    <div class="field">
      <label>Nueva contraseña</label>
      <input type="password" id="new-pass" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="field">
      <label>Repetir contraseña</label>
      <input type="password" id="confirm-pass" placeholder="Igual que la anterior">
    </div>
    <button type="button" class="btn-submit" onclick="doReset()">Guardar contraseña</button>
  </div>

  <div class="toggle"><a href="index.html">Volver al inicio de sesión</a></div>
</div>

<script>
  const DEV_HOSTS = ['localhost', '127.0.0.1'];
  const API = DEV_HOSTS.includes(window.location.hostname)
    ? 'https://doctorpro-dev.up.railway.app/api'
    : 'https://doctorpro-production.up.railway.app/api';

  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    showMsg('error', 'Enlace inválido. Solicitá uno nuevo.');
    document.getElementById('form-reset').style.display = 'none';
  }

  function showMsg(type, text) {
    const el = document.getElementById('msg');
    el.className = `msg ${type}`;
    el.textContent = text;
    el.style.display = 'block';
  }

  async function doReset() {
    const password = document.getElementById('new-pass').value;
    const confirm  = document.getElementById('confirm-pass').value;
    if (!password || password.length < 6) return showMsg('error', 'La contraseña debe tener al menos 6 caracteres');
    if (password !== confirm) return showMsg('error', 'Las contraseñas no coinciden');

    try {
      const res = await fetch(`${API}/auth/reset-password`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (!res.ok) return showMsg('error', data.error);
      showMsg('success', '✓ Contraseña actualizada. Ya podés iniciar sesión.');
      document.getElementById('form-reset').style.display = 'none';
    } catch { showMsg('error', 'Error de conexión con el servidor'); }
  }
</script>
</body>
</html>
